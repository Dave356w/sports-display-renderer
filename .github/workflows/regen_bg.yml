name: Regenerate Background Asset

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Lato font
        run: sudo apt-get install -y fonts-lato

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate new background
        run: python gen_background.py

      - name: Commit new background
        run: |
          git config user.name "sports-display-render-bot"
          git config user.email "actions@github.com"
          git add assets/background.png
          git diff --cached --quiet || git commit -m "Regenerate background: clean ePaper design"
          git push
