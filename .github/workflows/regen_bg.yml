name: Regenerate Background Asset

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-lato libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0

      - name: Install Python dependencies
        run: pip install -r requirements.txt cairosvg

      - name: Generate clean background
        run: python gen_background.py

      - name: Generate pennants from MLB CDN logos
        run: python gen_assets.py

      - name: Commit updated assets
        run: |
          git config user.name "sports-display-render-bot"
          git config user.email "actions@github.com"
          git add assets/
          git diff --cached --quiet || git commit -m "Regenerate assets: clean background + API-sourced team logos"
          git push
