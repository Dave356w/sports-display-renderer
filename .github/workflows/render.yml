name: Render Sports Display PNGs

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Lato font
        run: sudo apt-get install -y fonts-lato

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Render standings
        run: python render.py

      - name: Commit updated render
        run: |
          git config user.name "sports-display-render-bot"
          git config user.email "actions@github.com"
          git add public/*.png
          if ! git diff --cached --quiet; then
            git commit -m "Update standings $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit, skipping push."
          fi


