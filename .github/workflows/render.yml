name: Render Sports Display PNGs

on:
  schedule:
    - cron: "15 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python render.py

      - name: Commit updated renders
        run: |
          git config user.name "sports-display-render-bot"
          git config user.email "actions@github.com"
          git add public/*.png
          git diff --cached --quiet || git commit -m "Update rendered display PNGs"
          git push
