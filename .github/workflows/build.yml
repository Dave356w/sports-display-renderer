# .github/workflows/build.yml
# Build matchup site -> grade leans -> commit ledger -> deploy Pages.
# See MATCHUP_SITE.md for the full pipeline docs.
name: build-matchup-site

on:
  schedule:
    - cron: "15 8 * * *"     # ~3:15am ET (EDT) — after night games; grades
    - cron: "0 15 * * *"     # ~11am ET — lineup refresh; pending rows update
    - cron: "0 21 * * *"     # ~5pm ET — final pre-slate build
  workflow_dispatch:

permissions:
  contents: write            # commit ledger back to the repo
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build site
        run: python build_site.py
        # writes public/index.html and dumps the day's model outputs to
        # data/leans_{DATE}_xw.csv (+ _pl.csv) for the grading step below

      - name: Grade leans
        run: python grade_leans.py

      - name: Commit ledger
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add data/
          git diff --cached --quiet || git commit -m "ledger $(date -u +%FT%H:%MZ)"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # auto-enable Pages (source: Actions) on first run

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
