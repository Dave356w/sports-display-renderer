# One-time bridge: publishes the matchup-site-export branch to
# Dave356w/mlb-matchup-site once the MATCHUP_SITE_TOKEN secret exists
# (fine-grained PAT scoped to mlb-matchup-site, Contents: read/write).
# Safe to re-run: does nothing until the secret is set, and never
# touches the target repo unless it is still empty.
# Delete this file (and revoke the PAT) after the split completes.
name: split-bridge

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Publish export branch to mlb-matchup-site (only while empty)
        env:
          TOKEN: ${{ secrets.MATCHUP_SITE_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then echo "MATCHUP_SITE_TOKEN not set yet; nothing to do"; exit 0; fi
          TARGET="https://x-access-token:${TOKEN}@github.com/Dave356w/mlb-matchup-site.git"
          if [ -n "$(git ls-remote "$TARGET" 2>/dev/null)" ]; then echo "target repo not empty; nothing to do"; exit 0; fi
          git clone -b matchup-site-export --depth 1 https://github.com/Dave356w/sports-display-renderer.git site
          git -C site push "$TARGET" HEAD:main
          echo "published matchup-site-export -> mlb-matchup-site:main"
